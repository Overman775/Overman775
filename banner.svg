<svg fill="none" viewBox="0 0 800 300" width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .tui-window {
          font-family: 'FiraCode Nerd Font', Consolas, Monaco, 'Courier New', monospace;
          background: #121212;
          color: #EEFFFF;
          border-radius: 10px;
          height: 298px;
          display: flex;
          flex-direction: column;
          border: 1px solid #2C2C2C;
          box-shadow: 0 15px 35px rgba(0,0,0,0.6);
          box-sizing: border-box;
          overflow: hidden;
        }
        
        .header {
          background: #1A1A1A;
          height: 28px;
          display: flex;
          align-items: center;
          padding: 0 12px;
          border-bottom: 1px solid #2C2C2C;
          font-size: 12px;
          color: #546E7A;
        }
        
        .mac-dots {
          display: flex;
          gap: 6px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.r { background: #FF5370; }
        .dot.y { background: #FFCB6B; }
        .dot.g { background: #C3E88D; }
        
        .header-title {
          flex: 1;
          text-align: center;
          letter-spacing: 1px;
        }

        .tui-body {
          flex: 1;
          padding: 12px 16px;
          display: flex;
          flex-direction: column;
          gap: 12px;
        }

        .panel {
          border: 1px solid #333;
          border-radius: 6px;
          padding: 12px 14px;
          background: #161616;
          display: flex;
          flex-direction: column;
          position: relative;
        }

        .panel-title {
          position: absolute;
          top: -9px;
          left: 12px;
          background: #121212;
          padding: 0 6px;
          font-size: 11px;
          color: #C792EA;
          font-weight: bold;
        }

        .chat-log {
          flex: 1;
          font-size: 13.5px;
          line-height: 1.7;
        }

        .tui-prompt {
          display: flex;
          align-items: center;
          border: 1px solid #C3E88D;
          border-radius: 6px;
          padding: 10px 14px;
          background: rgba(195, 232, 141, 0.05);
          color: #EEFFFF;
          font-size: 14px;
        }

        .tui-prompt-icon {
          margin-right: 12px;
          font-weight: bold;
          font-size: 16px;
          color: #C3E88D;
        }
        
        .tui-cursor {
          display: inline-block;
          width: 8px;
          height: 15px;
          background: #EEFFFF;
          margin-left: 6px;
          vertical-align: middle;
          animation: blink 1s step-end infinite;
        }

        .status-bar {
          display: flex;
          justify-content: space-between;
          align-items: center;
          font-size: 12px;
          padding: 4px 16px;
          background: #1A1A1A;
          border-top: 1px solid #2C2C2C;
          color: #EEFFFF;
          font-weight: normal;
        }

        .agent-msg { color: #C3E88D; font-weight: bold; }
        .user-msg { color: #FFCB6B; font-weight: bold; }
        .highlight { color: #F07178; }
        .skill { color: #89DDFF; font-style: italic; }
        .time { color: #546E7A; margin-right: 8px; font-size: 12px; }

        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0; }
        }
      </style>
      <div class="tui-window">
        <div class="header">
          <div class="mac-dots">
            <div class="dot r"></div>
            <div class="dot y"></div>
            <div class="dot g"></div>
          </div>
          <div class="header-title">Agentic AI CLI</div>
        </div>
        
        <div class="tui-body">
          <div class="panel chat-log">
            <div class="panel-title">🧠 AI Systems Engineer Session</div>
            <div style="margin-top: 4px;">
              <span class="time">[16:50:12]</span> <span class="user-msg">❯ Identity:</span> <span style="color: #EEFFFF;">Alexey Zdorovykh (Engineering Manager)</span><br/>
              <span class="time">[16:50:14]</span> <span class="agent-msg">◈ Assistant:</span> Analyzing workspace... Found mobile architecture. <span style="color:#C3E88D">✔</span><br/>
              <span class="time">[16:50:16]</span> <span class="agent-msg">◈ Assistant:</span> Booting multi-agent orchestration subsystem...<br/>
              <span class="time">[16:50:19]</span> <span class="agent-msg">◈ Assistant:</span> Available skills loaded: <span class="skill">agent-orchestrator</span>, <span class="skill">architecture-optimizer</span>, <span class="skill">code-reviewer</span><br/>
              <span class="time">[16:50:20]</span> <span class="agent-msg">◈ Assistant:</span> Waiting for next task delegation.
            </div>
          </div>

          <div class="tui-prompt">
            <div class="tui-prompt-icon">?</div>
            <div style="flex: 1; display: flex; align-items: center;">
              <span>/skill <span style="color:#89DDFF">agent-orchestrator</span> --mode=autonomous --target=mobile-app</span><span class="tui-cursor"></span>
            </div>
          </div>
        </div>

        <div class="status-bar">
          <div><span style="color: #C3E88D; font-weight: bold;">NORMAL</span>  ~/workspace/Overman775  main</div>
          <div>Tokens: 14.8k  Models: Opus &amp; Gemini</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
